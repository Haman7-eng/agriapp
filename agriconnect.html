<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AgriConnect Pro | Farm to Table Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fafef5; color: #1a2e1a; }
        :root {
            --primary: #2d6a2d;
            --primary-dark: #1e4a1e;
            --accent: #f59e0b;
            --gray-bg: #f3f4f0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        .navbar { background: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .logo i { color: var(--accent); }
        .nav-buttons { display: flex; gap: 1rem; flex-wrap: wrap; }
        .btn-primary { background: var(--primary); color: white; padding: 0.5rem 1.2rem; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); padding: 0.5rem 1.2rem; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .btn-secondary { background: var(--accent); color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .container { max-width: 1300px; margin: 0 auto; padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .product-card, .farmer-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); transition: transform 0.2s; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { height: 200px; background: #e8f0e5; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 1rem; }
        .price { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; max-width: 500px; width: 90%; border-radius: 24px; padding: 2rem; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 12px; }
        .star-rating { display: flex; gap: 0.3rem; font-size: 1.5rem; cursor: pointer; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 0.8rem 1.5rem; border-radius: 50px; z-index: 1100; display: none; }
        .tabs { display: flex; gap: 1rem; border-bottom: 2px solid #ddd; margin-bottom: 1.5rem; }
        .tab { padding: 0.5rem 1rem; cursor: pointer; }
        .tab.active { border-bottom: 3px solid var(--primary); color: var(--primary); font-weight: 600; }
        @media (max-width: 768px) { .navbar { flex-direction: column; gap: 1rem; } .container { padding: 1rem; } }
    </style>
</head>
<body>
<div class="navbar">
    <div class="logo"><i class="fas fa-seedling"></i> AgriConnect Pro</div>
    <div class="nav-buttons">
        <button onclick="showMarketplace()" class="btn-outline">Marketplace</button>
        <button onclick="showFarmerDashboard()" class="btn-outline">Farmer Dashboard</button>
        <button onclick="showLoginModal()" class="btn-primary"><i class="fas fa-user"></i> Login/Register</button>
    </div>
</div>

<div id="marketplaceView" class="container">
    <h2><i class="fas fa-store"></i> Fresh Local Products</h2>
    <div class="form-group" style="margin: 1rem 0;">
        <input type="text" id="searchInput" placeholder="Search products or farmers..." style="width: 100%; padding: 0.8rem; border-radius: 40px;">
    </div>
    <div id="locationStatus" style="background: #e8f5e9; padding: 0.5rem; border-radius: 12px; margin-bottom: 1rem;"></div>
    <div class="tabs">
        <div class="tab active" onclick="filterProducts('all')">All</div>
        <div class="tab" onclick="filterProducts('Vegetables')">Vegetables</div>
        <div class="tab" onclick="filterProducts('Fruits')">Fruits</div>
        <div class="tab" onclick="filterProducts('Dairy')">Dairy</div>
        <div class="tab" onclick="filterProducts('Grains')">Grains</div>
    </div>
    <div id="productsGrid" class="grid"></div>
</div>

<div id="farmerView" class="container" style="display:none;">
    <h2><i class="fas fa-tractor"></i> Farmer Dashboard</h2>
    <div style="background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 1.5rem; border-radius: 20px; margin-bottom: 1.5rem;">
        <h3 id="farmerWelcome"></h3>
        <button onclick="openAddProductModal()" class="btn-secondary" style="margin-top: 1rem;"><i class="fas fa-plus"></i> Add New Product</button>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="showFarmerProducts()">My Products</div>
        <div class="tab" onclick="showFarmerOrders()">Orders Received</div>
    </div>
    <div id="farmerProductsList" class="grid"></div>
    <div id="farmerOrdersList" style="display:none;"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content" id="modalContent"></div>
</div>
<div id="toast" class="toast"></div>

<script>
    // ========== DATA MODELS ==========
    let users = JSON.parse(localStorage.getItem('agri_users')) || [];
    let products = JSON.parse(localStorage.getItem('agri_products')) || [];
    let orders = JSON.parse(localStorage.getItem('agri_orders')) || [];
    let currentUser = JSON.parse(sessionStorage.getItem('agri_current_user')) || null;
    let currentFilter = 'all';
    let currentLocation = null;

    // Sample initial data
    if(products.length === 0) {
        products = [
            { id: 1, name: "Organic Tomatoes", category: "Vegetables", price: 3.99, unit: "kg", farmerId: 1, farmerName: "Green Valley Farm", image: "https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=300&h=200&fit=crop", stock: 45, rating: 4.5, reviews: [] },
            { id: 2, name: "Fresh Avocados", category: "Fruits", price: 2.49, unit: "piece", farmerId: 2, farmerName: "Sunrise Orchards", image: "https://images.unsplash.com/photo-1523049673857-eb18f1d7b578?w=300&h=200&fit=crop", stock: 30, rating: 4.8, reviews: [] },
            { id: 3, name: "A2 Desi Milk", category: "Dairy", price: 1.89, unit: "liter", farmerId: 1, farmerName: "Green Valley Farm", image: "https://images.unsplash.com/photo-1550583724-b2692b85b150?w=300&h=200&fit=crop", stock: 20, rating: 4.6, reviews: [] }
        ];
        localStorage.setItem('agri_products', JSON.stringify(products));
    }
    if(users.length === 0) {
        users = [
            { id: 1, name: "Rajesh Kumar", email: "farmer@agri.com", password: "123", role: "farmer", farmName: "Green Valley Farm", location: { lat: 28.6139, lng: 77.2090 }, phone: "9876543210" },
            { id: 2, name: "Priya Sharma", email: "customer@test.com", password: "123", role: "customer", location: null }
        ];
        localStorage.setItem('agri_users', JSON.stringify(users));
    }

    function showToast(msg) { let t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }

    function getLocation() {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                document.getElementById('locationStatus').innerHTML = `<i class="fas fa-map-marker-alt"></i> Location detected! Showing nearby farms & products.`;
                renderProducts();
            }, () => {
                document.getElementById('locationStatus').innerHTML = `<i class="fas fa-exclamation-triangle"></i> Enable location to see nearest farms.`;
            });
        }
    }

    function showMarketplace() {
        document.getElementById('marketplaceView').style.display = 'block';
        document.getElementById('farmerView').style.display = 'none';
        renderProducts();
        getLocation();
    }

    function showFarmerDashboard() {
        if(!currentUser || currentUser.role !== 'farmer') { showToast('Please login as a farmer first'); showLoginModal(); return; }
        document.getElementById('marketplaceView').style.display = 'none';
        document.getElementById('farmerView').style.display = 'block';
        document.getElementById('farmerWelcome').innerHTML = `Welcome back, ${currentUser.farmName || currentUser.name}! 🌾`;
        showFarmerProducts();
    }

    function renderProducts() {
        let filtered = products.filter(p => currentFilter === 'all' || p.category === currentFilter);
        const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
        if(search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || p.farmerName.toLowerCase().includes(search));
        const grid = document.getElementById('productsGrid');
        if(filtered.length === 0) { grid.innerHTML = '<p>No products found. Farmers, add your products!</p>'; return; }
        grid.innerHTML = filtered.map(p => `
            <div class="product-card" onclick="viewProduct(${p.id})">
                <div class="product-img"><img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x200?text=Organic+Product'"></div>
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <p><i class="fas fa-tractor"></i> ${p.farmerName}</p>
                    <div class="price">$${p.price} / ${p.unit}</div>
                    <div><i class="fas fa-star" style="color: gold;"></i> ${p.rating} (${p.reviews.length} reviews)</div>
                    <button class="btn-primary" style="margin-top:0.5rem; width:100%" onclick="event.stopPropagation(); orderProduct(${p.id})">Order Now</button>
                </div>
            </div>
        `).join('');
    }

    function viewProduct(productId) { window.location.href = `#product-${productId}`; orderProduct(productId); }
    
    function orderProduct(productId) {
        if(!currentUser) { showToast('Please login to order'); showLoginModal(); return; }
        const product = products.find(p => p.id === productId);
        if(!product) return;
        const modal = document.getElementById('modal');
        document.getElementById('modalContent').innerHTML = `
            <h3>Order ${product.name}</h3>
            <div class="form-group"><label>Quantity (${product.unit})</label><input type="number" id="qty" min="1" max="${product.stock}" value="1"></div>
            <div class="form-group"><label>Delivery Address</label><textarea id="addr" rows="2" required></textarea></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="phone" value="${currentUser.phone || ''}"></div>
            <button class="btn-primary" onclick="placeOrder(${productId})">Place Order (Cash on Delivery)</button>
            <button class="btn-outline" onclick="closeModal()">Cancel</button>
        `;
        modal.style.display = 'flex';
    }

    function placeOrder(productId) {
        const qty = parseInt(document.getElementById('qty').value);
        const addr = document.getElementById('addr').value;
        const phone = document.getElementById('phone').value;
        if(!addr) { showToast('Enter address'); return; }
        const product = products.find(p => p.id === productId);
        if(!product || qty > product.stock) { showToast('Insufficient stock'); closeModal(); return; }
        const newOrder = {
            id: Date.now(),
            productId, productName: product.name, farmerId: product.farmerId, farmerName: product.farmerName,
            customerId: currentUser.id, customerName: currentUser.name, quantity: qty, total: qty * product.price,
            address: addr, phone, status: 'pending', createdAt: new Date().toISOString()
        };
        orders.push(newOrder);
        product.stock -= qty;
        localStorage.setItem('agri_products', JSON.stringify(products));
        localStorage.setItem('agri_orders', JSON.stringify(orders));
        showToast(`Order placed! Farmer ${product.farmerName} will contact you.`);
        closeModal();
        renderProducts();
        // SMS simulation - in production use Twilio API
        console.log(`SMS to farmer ${product.farmerName}: New order for ${product.name}`);
        showFarmerDashboard();
    }

    function openAddProductModal() {
        if(!currentUser || currentUser.role !== 'farmer') { showToast('Login as farmer first'); return; }
        const modal = document.getElementById('modal');
        document.getElementById('modalContent').innerHTML = `
            <h3>Add New Product</h3>
            <div class="form-group"><label>Product Name</label><input id="prodName" placeholder="e.g., Organic Carrots"></div>
            <div class="form-group"><label>Category</label><select id="prodCat"><option>Vegetables</option><option>Fruits</option><option>Dairy</option><option>Grains</option></select></div>
            <div class="form-group"><label>Price (USD)</label><input type="number" id="prodPrice" step="0.01"></div>
            <div class="form-group"><label>Unit</label><input id="prodUnit" placeholder="kg, dozen, liter"></div>
            <div class="form-group"><label>Image URL</label><input id="prodImage" placeholder="https://..."></div>
            <div class="form-group"><label>Stock Quantity</label><input type="number" id="prodStock" value="50"></div>
            <button class="btn-primary" onclick="addProduct()">Add Product</button>
        `;
        modal.style.display = 'flex';
    }

    function addProduct() {
        const name = document.getElementById('prodName').value;
        const category = document.getElementById('prodCat').value;
        const price = parseFloat(document.getElementById('prodPrice').value);
        const unit = document.getElementById('prodUnit').value;
        const image = document.getElementById('prodImage').value || 'https://images.unsplash.com/photo-1566385101042-1a0aa0c1268c?w=300&h=200&fit=crop';
        const stock = parseInt(document.getElementById('prodStock').value);
        if(!name || !price || !unit) { showToast('Fill all fields'); return; }
        const newProduct = {
            id: Date.now(), name, category, price, unit, farmerId: currentUser.id, farmerName: currentUser.farmName || currentUser.name,
            image, stock, rating: 0, reviews: []
        };
        products.push(newProduct);
        localStorage.setItem('agri_products', JSON.stringify(products));
        showToast('Product added successfully!');
        closeModal();
        showFarmerProducts();
    }

    function showFarmerProducts() {
        const myProducts = products.filter(p => p.farmerId === currentUser?.id);
        const container = document.getElementById('farmerProductsList');
        document.getElementById('farmerProductsList').style.display = 'grid';
        document.getElementById('farmerOrdersList').style.display = 'none';
        if(myProducts.length === 0) { container.innerHTML = '<p>No products yet. Click "Add New Product".</p>'; return; }
        container.innerHTML = myProducts.map(p => `
            <div class="product-card">
                <div class="product-img"><img src="${p.image}" style="width:100%;height:150px;object-fit:cover"></div>
                <div class="product-info">
                    <h4>${p.name}</h4>
                    <p>$${p.price} / ${p.unit} | Stock: ${p.stock}</p>
                    <button class="btn-outline" onclick="deleteProduct(${p.id})">Delete</button>
                </div>
            </div>
        `).join('');
    }

    function showFarmerOrders() {
        const myOrders = orders.filter(o => o.farmerId === currentUser?.id);
        const container = document.getElementById('farmerOrdersList');
        document.getElementById('farmerProductsList').style.display = 'none';
        document.getElementById('farmerOrdersList').style.display = 'block';
        if(myOrders.length === 0) { container.innerHTML = '<p>No orders yet.</p>'; return; }
        container.innerHTML = myOrders.map(o => `
            <div style="background:white; border-radius:16px; padding:1rem; margin-bottom:1rem;">
                <p><strong>${o.productName}</strong> x${o.quantity} = $${o.total}</p>
                <p>Customer: ${o.customerName} | Phone: ${o.phone}</p>
                <p>Address: ${o.address}</p>
                <p>Status: ${o.status}</p>
                <button class="btn-primary" onclick="updateOrderStatus(${o.id}, 'confirmed')">Confirm Order</button>
                <button class="btn-outline" onclick="updateOrderStatus(${o.id}, 'delivered')">Mark Delivered</button>
            </div>
        `).join('');
    }

    function updateOrderStatus(orderId, status) {
        const order = orders.find(o => o.id === orderId);
        if(order) { order.status = status; localStorage.setItem('agri_orders', JSON.stringify(orders)); showToast(`Order ${status}!`); showFarmerOrders(); }
    }

    function deleteProduct(productId) {
        products = products.filter(p => p.id !== productId);
        localStorage.setItem('agri_products', JSON.stringify(products));
        showToast('Product deleted');
        showFarmerProducts();
        renderProducts();
    }

    function filterProducts(cat) { currentFilter = cat; renderProducts(); }

    function showLoginModal() {
        const modal = document.getElementById('modal');
        document.getElementById('modalContent').innerHTML = `
            <h3>Login / Register</h3>
            <div class="form-group"><label>Email</label><input id="loginEmail" placeholder="email@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="password"></div>
            <button class="btn-primary" onclick="login()">Login</button>
            <hr style="margin:1rem 0">
            <h4>Register as Farmer</h4>
            <div class="form-group"><label>Full Name</label><input id="regName"></div>
            <div class="form-group"><label>Email</label><input id="regEmail"></div>
            <div class="form-group"><label>Password</label><input type="password" id="regPass"></div>
            <div class="form-group"><label>Farm Name</label><input id="farmName"></div>
            <div class="form-group"><label>Phone</label><input id="regPhone"></div>
            <button class="btn-primary" onclick="registerFarmer()">Register as Farmer</button>
            <button class="btn-outline" onclick="registerCustomer()">Register as Customer</button>
        `;
        modal.style.display = 'flex';
    }

    function login() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        const user = users.find(u => u.email === email && u.password === pass);
        if(!user) { showToast('Invalid credentials'); return; }
        currentUser = user;
        sessionStorage.setItem('agri_current_user', JSON.stringify(user));
        showToast(`Welcome ${user.name}!`);
        closeModal();
        if(user.role === 'farmer') showFarmerDashboard();
        else showMarketplace();
    }

    function registerFarmer() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const farmName = document.getElementById('farmName').value;
        const phone = document.getElementById('regPhone').value;
        if(!name || !email || !pass) { showToast('Fill required fields'); return; }
        const newUser = { id: Date.now(), name, email, password: pass, role: 'farmer', farmName, phone, location: null };
        users.push(newUser);
        localStorage.setItem('agri_users', JSON.stringify(users));
        showToast('Registration successful! Please login.');
        login();
    }

    function registerCustomer() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        if(!name || !email || !pass) { showToast('Fill required fields'); return; }
        const newUser = { id: Date.now(), name, email, password: pass, role: 'customer', phone: document.getElementById('regPhone').value || '' };
        users.push(newUser);
        localStorage.setItem('agri_users', JSON.stringify(users));
        showToast('Customer registered! Please login.');
        login();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target === document.getElementById('modal')) closeModal(); };
    
    getLocation();
    if(currentUser && currentUser.role === 'farmer') showFarmerDashboard();
    else showMarketplace();
</script>
</body>
</html>
